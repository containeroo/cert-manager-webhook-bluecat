---
version: 2
project_name: cert-manager-webhook-bluecat

builds:
  - id: webhook
    main: .
    binary: webhook
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers_v2:
  - ids:
      - webhook
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/containeroo/cert-manager-webhook-bluecat
      - containeroo/cert-manager-webhook-bluecat
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - --pull
      - --cache-from=type=gha,scope=cert-manager-webhook-bluecat
      - --cache-to=type=gha,mode=max,scope=cert-manager-webhook-bluecat
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: cert-manager DNS01 webhook for BlueCat Address Manager REST v2
      org.opencontainers.image.url: https://github.com/containeroo/cert-manager-webhook-bluecat
      org.opencontainers.image.source: https://github.com/containeroo/cert-manager-webhook-bluecat
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: '{{ time "2006-01-02T15:04:05Z07:00" }}'
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: Apache-2.0
